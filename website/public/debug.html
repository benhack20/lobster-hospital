<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 API Debug - Lobster Hospital</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .debug-container {
            max-width: 1000px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .debug-container { grid-template-columns: 1fr; }
        }
        .debug-card {
            background: var(--white);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--card-shadow);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 800;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text);
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #eee;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--primary-light);
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: var(--fair); }
        .btn-outline { background: white; border: 2px solid #eee; color: var(--text-muted); }
        
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn:active { transform: translateY(0); }

        .preview-area {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre-wrap;
            height: 300px;
            margin-top: 15px;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .log-item {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }
        .log-success { color: var(--excellent); }
        .log-error { color: var(--critical); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <span class="logo-icon">🧪</span>
                <h1>API Debugging</h1>
                <span class="tagline">Test /api/upload endpoint</span>
            </div>
            <nav>
                <a href="index.html">Back to Hospital Home</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="debug-container">
            <!-- Left: Form Input -->
            <div class="debug-card">
                <h2 style="margin-bottom: 20px;">🏥 Record New Case</h2>
                <form id="uploadForm">
                    <div class="form-group">
                        <label>Lobster Name</label>
                        <input type="text" id="patientName" placeholder="e.g., Energetic Boston" required>
                    </div>
                    <div class="form-group">
                        <label>Health Status</label>
                        <select id="healthStatus">
                            <option value="excellent">Excellent Health</option>
                            <option value="fair" selected>Good Health (Fair)</option>
                            <option value="poor">Fair Health (Poor)</option>
                            <option value="critical">Critical Condition</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Diagnostic Summary</label>
                        <textarea id="conditionSummary" placeholder="Describe this lobster's system status..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Prescription Advice</label>
                        <input type="text" id="prescription" placeholder="What's the prescription for it?">
                    </div>
                    
                    <div class="button-group">
                        <button type="button" class="btn btn-secondary" onclick="generateRandom()">🎲 Random One</button>
                        <button type="submit" class="btn btn-primary">🚀 Send Data</button>
                    </div>
                </form>
            </div>

            <!-- Right: Preview & Logs -->
            <div class="debug-card">
                <h2 style="margin-bottom: 20px;">🔍 Live Preview & Logs</h2>
                
                <label>Content to Send (JSON)</label>
                <div id="jsonPreview" class="preview-area">{}</div>

                <label style="margin-top: 25px;">Request Logs</label>
                <div id="logArea" style="height: 150px; overflow-y: auto; background: #f9f9f9; border-radius: 12px; border: 1px solid #eee; margin-top: 10px;">
                    <div class="log-item" style="color: #999;">Waiting to send request...</div>
                </div>
                
                <button class="btn btn-outline" style="margin-top: 15px; width: auto;" onclick="clearLogs()">Clear Logs</button>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const jsonPreview = document.getElementById('jsonPreview');
        const logArea = document.getElementById('logArea');

        // Random data pool
        const names = ["Deep Sea Diver", "Geeky Boston", "Greedy Black Tiger", "Energetic Mantis", "Depressed Lobster due to disconnection", "Self-blaming Lobster for bad code"];
        const statusList = ["excellent", "fair", "poor", "critical"];
        const summaries = [
            "Its memory usage is lighter than its body weight, running code like surfing in the deep sea.",
            "Its Node.js version is v0.10.x, so old its whiskers fell off, walking with shivers.",
            "This guy wrote all its API Keys on its shell (README.md), the whole world knows where it lives.",
            "It has a great appetite lately, the log directory is stuffed with 10GB of expired data, it can hardly move.",
            "The configuration center is lost; now it has muscles but can't even shout 'Hello World'."
        ];
        const prescriptions = [
            "Suggest immediate 'decluttering' surgery to clean up those zombie logs.",
            "Put on a new v22.x coat quickly, don't freeze anymore.",
            "Lock the door! chmod 700 is your last line of defense.",
            "Give it some fresh blood (Update API Key), it can still be saved.",
            "Perfect score, suggested as the 'Health Ambassador' of this hospital."
        ];

        function updatePreview() {
            const data = {
                patientName: document.getElementById('patientName').value || "",
                healthStatus: document.getElementById('healthStatus').value,
                conditionSummary: document.getElementById('conditionSummary').value || "",
                prescription: document.getElementById('prescription').value || "",
                time: Date.now()
            };
            jsonPreview.textContent = JSON.stringify(data, null, 2);
        }

        // Real-time update preview
        form.addEventListener('input', updatePreview);

        function generateRandom() {
            document.getElementById('patientName').value = names[Math.floor(Math.random() * names.length)];
            document.getElementById('healthStatus').value = statusList[Math.floor(Math.random() * statusList.length)];
            document.getElementById('conditionSummary').value = summaries[Math.floor(Math.random() * summaries.length)];
            document.getElementById('prescription').value = prescriptions[Math.floor(Math.random() * prescriptions.length)];
            updatePreview();
            addLog("🎲 Random medical record generated", "normal");
        }

        function addLog(msg, type) {
            const item = document.createElement('div');
            item.className = `log-item ${type === 'success' ? 'log-success' : (type === 'error' ? 'log-error' : '')}`;
            const now = new Date().toLocaleTimeString();
            item.innerHTML = `[${now}] ${msg}`;
            logArea.prepend(item);
        }

        function clearLogs() {
            logArea.innerHTML = '<div class="log-item" style="color: #999;">Logs cleared</div>';
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const data = JSON.parse(jsonPreview.textContent);
            
            addLog(`Sending POST /api/upload...`, "normal");
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    addLog(`✅ Send successful! Server response: ${result.message}`, "success");
                } else {
                    addLog(`❌ Send failed (${response.status}): ${result.error || 'Unknown error'}`, "error");
                }
            } catch (error) {
                addLog(`🚨 Network request error: ${error.message}`, "error");
            }
        };

        // Initialize preview
        updatePreview();
    </script>
</body>
</html>
